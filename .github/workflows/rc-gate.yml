name: rc-gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rc-gate:
    runs-on: ubuntu-24.04
    env:
      GATE_PLAN: ci/plans/rc-gate.json
    steps:
      - uses: actions/checkout@v5.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
      - name: Resolve runtime paths
        run: |
          echo "REPORT_ROOT=$RUNNER_TEMP/reports" >> "$GITHUB_ENV"
      - name: Prepare report directories
        run: |
          python3 ci/run_gate_step.py \
            --workflow rc-gate \
            --step-id prepare-report-directories \
            --report-root "$REPORT_ROOT"
      - name: Capture host build environment
        run: |
          python3 ci/run_gate_step.py \
            --workflow rc-gate \
            --step-id capture-host-build-environment \
            --report-root "$REPORT_ROOT"
      - name: cargo xtask rc-gate
        id: cargo_xtask_rc_gate
        run: |
          python3 ci/run_gate_step.py \
            --workflow rc-gate \
            --step-id cargo-xtask-rc-gate \
            --report-root "$REPORT_ROOT"
      - name: Replay stop-ship contract
        if: always() && steps.cargo_xtask_rc_gate.outcome != 'skipped'
        run: |
          python3 ci/run_gate_step.py \
            --workflow rc-gate \
            --step-id path-aware-replay-stop-ship \
            --report-root "$REPORT_ROOT"
      - name: Gate summary
        if: always()
        run: |
          python3 ci/gate_summary.py \
            --plan "$GATE_PLAN" \
            --report-root "$REPORT_ROOT"
      - name: Upload rc-gate artifacts
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: rc-gate-artifacts
          path: ${{ runner.temp }}/reports
          if-no-files-found: warn
