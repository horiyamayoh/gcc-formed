name: nightly-gate

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-gate:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - gcc_image: gcc:13
            gcc_label: gcc13
            version_band: gcc13_14
            release_blocker: false
          - gcc_image: gcc:14
            gcc_label: gcc14
            version_band: gcc13_14
            release_blocker: false
          - gcc_image: gcc:12
            gcc_label: gcc12
            version_band: gcc9_12
            release_blocker: false
          - gcc_image: gcc:15
            gcc_label: gcc15
            version_band: gcc15_plus
            release_blocker: true
    env:
      GATE_PLAN: ci/plans/nightly-gate.json
      MATRIX_GCC_VERSION: ${{ matrix.gcc_image }}
      MATRIX_VERSION_BAND: ${{ matrix.version_band }}
      RELEASE_BLOCKER: ${{ matrix.release_blocker && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v5.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-musl
      - name: Resolve runtime paths
        run: |
          echo "REPORT_ROOT=$RUNNER_TEMP/reports" >> "$GITHUB_ENV"
          echo "TARGET_DIR=$RUNNER_TEMP/gcc-formed-target" >> "$GITHUB_ENV"
      - name: Resolve package version
        run: |
          package_version="$(python3 - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as handle:
              cargo = tomllib.load(handle)
          print(cargo["workspace"]["package"]["version"])
          PY
          )"
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "CONTROL_DIR=dist/gcc-formed-v${package_version}-linux-x86_64-musl" >> "$GITHUB_ENV"
      - name: Prepare report directories
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id prepare-report-directories \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'mkdir -p "$REPORT_ROOT/replay" "$REPORT_ROOT/snapshot" "$REPORT_ROOT/self-check" "$REPORT_ROOT/release" "$TARGET_DIR"'
      - name: Capture host build environment
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id capture-host-build-environment \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'python3 ci/gate_capture_environment.py --output "$REPORT_ROOT/gate/build-environment.json" --mode host --toolchain-file rust-toolchain.toml'
      - name: Build matrix CI image
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id build-matrix-ci-image \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'docker build --build-arg GCC_IMAGE=${MATRIX_GCC_VERSION} -t gcc-formed-ci:nightly -f ci/images/gcc-matrix/Dockerfile .'
      - name: Capture matrix CI environment
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id capture-matrix-ci-environment \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'python3 ci/gate_capture_environment.py --output "$REPORT_ROOT/gate/build-environment.json" --mode ci-image --toolchain-file rust-toolchain.toml --dockerfile ci/images/gcc-matrix/Dockerfile --docker-base-image "$MATRIX_GCC_VERSION" --docker-image-tag gcc-formed-ci:nightly'
      - name: cargo test --workspace
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id cargo-test-workspace \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo test --workspace'
      - name: Representative acceptance replay
        id: representative_acceptance_replay
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id representative-acceptance-replay \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo xtask replay --root corpus --subset representative --report-dir "$REPORT_ROOT/replay"'
      - name: Replay stop-ship contract
        if: always() && steps.representative_acceptance_replay.outcome != 'skipped'
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id path-aware-replay-stop-ship \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'python3 ci/gate_replay_contract.py --replay-report "$REPORT_ROOT/replay/replay-report.json" --output "$REPORT_ROOT/gate/replay-stop-ship.json"'
      - name: cargo xtask bench-smoke
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id cargo-xtask-bench-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo xtask bench-smoke > "$REPORT_ROOT/release/bench-smoke.json"'
      - name: cargo xtask fuzz-smoke
        if: matrix.release_blocker
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id cargo-xtask-fuzz-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo xtask fuzz-smoke --root fuzz --report-dir "$REPORT_ROOT/release"'
      - name: Build wrapper binary in matrix image
        run: |
          command=$(cat <<'EOF'
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$TARGET_DIR:/tmp/gcc-formed-target" \
            -w /workspace \
            gcc-formed-ci:nightly \
            bash -lc "export CARGO_TARGET_DIR=/tmp/gcc-formed-target && cargo build --bin gcc-formed"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id build-wrapper-binary-matrix-image \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Wrapper self-check in matrix image
        run: |
          command=$(cat <<'EOF'
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$TARGET_DIR:/tmp/gcc-formed-target" \
            -v "$REPORT_ROOT:/reports" \
            -w /workspace \
            gcc-formed-ci:nightly \
            bash -lc "export CARGO_TARGET_DIR=/tmp/gcc-formed-target && /tmp/gcc-formed-target/debug/gcc-formed --formed-self-check > /reports/self-check/report.json"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id wrapper-self-check-matrix-image \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Representative matrix snapshot check
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id representative-matrix-snapshot-check \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo xtask snapshot --root corpus --subset representative --check --docker-image "$MATRIX_GCC_VERSION" --version-band "$MATRIX_VERSION_BAND" --report-dir "$REPORT_ROOT/snapshot"'
      - name: Vendor dependency tree
        if: matrix.release_blocker
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id vendor-dependency-tree \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo xtask vendor --output-dir vendor > "$REPORT_ROOT/release/vendor.json"'
      - name: Hermetic release build smoke
        if: matrix.release_blocker
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id hermetic-release-build-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo xtask hermetic-release-check --vendor-dir vendor --bin gcc-formed --target-triple x86_64-unknown-linux-musl > "$REPORT_ROOT/release/hermetic-release.json"'
      - name: Release packaging smoke
        if: matrix.release_blocker
        run: |
          command=$(cat <<'EOF'
          printf '%s\n' '000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f' > "$RUNNER_TEMP/release-signing.key"
          cargo xtask package \
            --binary target/hermetic-release/x86_64-unknown-linux-musl/release/gcc-formed \
            --target-triple x86_64-unknown-linux-musl \
            --release-channel beta \
            --maturity-label v1beta \
            --signing-private-key "$RUNNER_TEMP/release-signing.key" \
            > "$REPORT_ROOT/release/package.json"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id release-packaging-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Release install smoke
        if: matrix.release_blocker
        run: |
          command=$(cat <<'EOF'
          trusted_signing_public_key_sha256="56475aa75463474c0285df5dbf2bcab73da651358839e9b77481b2eab107708c"
          control_dir="$CONTROL_DIR"
          install_root="$RUNNER_TEMP/gcc-formed/x86_64-unknown-linux-musl"
          bin_dir="$RUNNER_TEMP/gcc-formed/bin"
          signing_key_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["key_id"])' "$control_dir/SHA256SUMS.sig")"
          cargo xtask install --control-dir "$control_dir" --install-root "$install_root" --bin-dir "$bin_dir" --expected-signing-key-id "$signing_key_id" --expected-signing-public-key-sha256 "$trusted_signing_public_key_sha256" > "$REPORT_ROOT/release/install.json"
          "$bin_dir/gcc-formed" --formed-version > "$REPORT_ROOT/release/installed-version.txt"
          cargo xtask uninstall --install-root "$install_root" --bin-dir "$bin_dir" --mode purge-install > "$REPORT_ROOT/release/uninstall.json"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id release-install-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Rollback symlink smoke
        if: matrix.release_blocker
        run: |
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id rollback-symlink-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command 'cargo test -p xtask rollback_switches_current_symlink_to_requested_version > "$REPORT_ROOT/release/rollback-smoke.txt"'
      - name: System-wide layout smoke
        if: matrix.release_blocker
        run: |
          command=$(cat <<'EOF'
          trusted_signing_public_key_sha256="56475aa75463474c0285df5dbf2bcab73da651358839e9b77481b2eab107708c"
          control_dir="$CONTROL_DIR"
          install_root="$RUNNER_TEMP/system-root/opt/cc-formed/x86_64-unknown-linux-musl"
          bin_dir="$RUNNER_TEMP/system-root/usr/local/bin"
          signing_key_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["key_id"])' "$control_dir/SHA256SUMS.sig")"
          cargo xtask install --control-dir "$control_dir" --install-root "$install_root" --bin-dir "$bin_dir" --expected-signing-key-id "$signing_key_id" --expected-signing-public-key-sha256 "$trusted_signing_public_key_sha256" > "$REPORT_ROOT/release/system-install.json"
          "$bin_dir/gcc-formed" --formed-version > "$REPORT_ROOT/release/system-version.txt"
          cargo xtask uninstall --install-root "$install_root" --bin-dir "$bin_dir" --mode purge-install > "$REPORT_ROOT/release/system-uninstall.json"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id system-wide-layout-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Release repository promote and pin smoke
        if: matrix.release_blocker
        run: |
          command=$(cat <<'EOF'
          trusted_signing_public_key_sha256="56475aa75463474c0285df5dbf2bcab73da651358839e9b77481b2eab107708c"
          control_dir="$CONTROL_DIR"
          repo_root="$RUNNER_TEMP/gcc-formed-release-repo"
          resolved_json="$REPORT_ROOT/release/release-resolve-beta.json"
          install_root="$RUNNER_TEMP/gcc-formed-release/x86_64-unknown-linux-musl"
          bin_dir="$RUNNER_TEMP/gcc-formed-release-bin"

          cargo xtask release-publish --control-dir "$control_dir" --repository-root "$repo_root" > "$REPORT_ROOT/release/release-publish.json"
          cargo xtask release-promote --repository-root "$repo_root" --target-triple x86_64-unknown-linux-musl --version "$PACKAGE_VERSION" --channel canary > "$REPORT_ROOT/release/release-promote-canary.json"
          cargo xtask release-promote --repository-root "$repo_root" --target-triple x86_64-unknown-linux-musl --version "$PACKAGE_VERSION" --channel beta > "$REPORT_ROOT/release/release-promote-beta.json"
          cargo xtask release-resolve --repository-root "$repo_root" --target-triple x86_64-unknown-linux-musl --channel beta > "$resolved_json"
          primary_sha="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["primary_archive_sha256"])' "$resolved_json")"
          signing_key_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["signing_key_id"])' "$resolved_json")"
          cargo xtask install-release --repository-root "$repo_root" --target-triple x86_64-unknown-linux-musl --version "$PACKAGE_VERSION" --expected-primary-sha256 "$primary_sha" --expected-signing-key-id "$signing_key_id" --expected-signing-public-key-sha256 "$trusted_signing_public_key_sha256" --install-root "$install_root" --bin-dir "$bin_dir" > "$REPORT_ROOT/release/install-release.json"
          "$bin_dir/gcc-formed" --formed-version > "$REPORT_ROOT/release/install-release-version.txt"
          cargo xtask uninstall --install-root "$install_root" --bin-dir "$bin_dir" --mode purge-install > "$REPORT_ROOT/release/install-release-uninstall.json"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id release-repository-promote-and-pin-smoke \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Release provenance manifest
        if: always()
        run: |
          command=$(cat <<'EOF'
          python3 ci/release_provenance.py \
            --workflow nightly-gate \
            --report-root "$REPORT_ROOT" \
            --output "$REPORT_ROOT/release/release-provenance.json" \
            --package-version "$PACKAGE_VERSION" \
            --target-triple x86_64-unknown-linux-musl \
            --release-channel beta \
            --maturity-label v1beta \
            --matrix-gcc-image "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id release-provenance-manifest \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Dependency and license gate
        if: matrix.release_blocker
        run: |
          command=$(cat <<'EOF'
          cargo install cargo-deny --locked
          cargo deny check > "$REPORT_ROOT/release/cargo-deny.txt"
          EOF
          )
          python3 ci/gate_step.py \
            --plan "$GATE_PLAN" \
            --step-id dependency-and-license-gate \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER" \
            --command "$command"
      - name: Gate summary
        if: always()
        run: |
          python3 ci/gate_summary.py \
            --plan "$GATE_PLAN" \
            --report-root "$REPORT_ROOT" \
            --matrix-gcc-version "$MATRIX_GCC_VERSION" \
            --matrix-version-band "$MATRIX_VERSION_BAND" \
            --release-blocker "$RELEASE_BLOCKER"
      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: nightly-${{ matrix.gcc_label }}-artifacts
          path: |
            ${{ runner.temp }}/reports
            dist
          if-no-files-found: warn
