name: pr-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt
      - name: Build GCC 15 CI image
        run: docker build --build-arg GCC_IMAGE=gcc:15 -t gcc-formed-ci:pr -f ci/images/gcc-matrix/Dockerfile .
      - name: Run local fast gate
        run: >
          docker run --rm -v "$PWD:/workspace" -w /workspace gcc-formed-ci:pr
          bash -lc "cargo xtask check && cargo xtask replay --root corpus && cargo build --bin gcc-formed && ./target/debug/gcc-formed --formed-self-check"
      - name: Representative GCC 15 snapshot check
        run: cargo xtask snapshot --root corpus --subset representative --check --docker-image gcc:15
      - name: Hermetic release build smoke
        run: |
          cargo xtask vendor --output-dir vendor
          cargo xtask hermetic-release-check --vendor-dir vendor --bin gcc-formed
      - name: Release packaging smoke
        run: >
          cargo build --bin gcc-formed &&
          cargo xtask package
          --binary target/debug/gcc-formed
          --target-triple x86_64-unknown-linux-gnu
          --release-channel stable
          --support-tier gcc15_primary
      - name: Release install smoke
        run: |
          control_dir="dist/gcc-formed-v0.1.0-linux-x86_64-gnu"
          install_root="$RUNNER_TEMP/gcc-formed/x86_64-unknown-linux-gnu"
          bin_dir="$RUNNER_TEMP/gcc-formed/bin"
          cargo xtask install --control-dir "$control_dir" --install-root "$install_root" --bin-dir "$bin_dir"
          "$bin_dir/gcc-formed" --formed-version
          cargo xtask uninstall --install-root "$install_root" --bin-dir "$bin_dir" --mode purge-install
      - name: Release repository promote and pin smoke
        run: |
          control_dir="dist/gcc-formed-v0.1.0-linux-x86_64-gnu"
          repo_root="$RUNNER_TEMP/gcc-formed-release-repo"
          resolved_json="$RUNNER_TEMP/gcc-formed-stable-release.json"
          install_root="$RUNNER_TEMP/gcc-formed-release/x86_64-unknown-linux-gnu"
          bin_dir="$RUNNER_TEMP/gcc-formed-release-bin"

          cargo xtask release-publish --control-dir "$control_dir" --repository-root "$repo_root"
          cargo xtask release-promote --repository-root "$repo_root" --target-triple x86_64-unknown-linux-gnu --version 0.1.0 --channel canary
          cargo xtask release-promote --repository-root "$repo_root" --target-triple x86_64-unknown-linux-gnu --version 0.1.0 --channel stable
          cargo xtask release-resolve --repository-root "$repo_root" --target-triple x86_64-unknown-linux-gnu --channel stable > "$resolved_json"
          primary_sha="$(python3 - "$resolved_json" <<'PY'
import json
import sys

with open(sys.argv[1], "r", encoding="utf-8") as handle:
    print(json.load(handle)["primary_archive_sha256"])
PY
)"
          cargo xtask install-release --repository-root "$repo_root" --target-triple x86_64-unknown-linux-gnu --version 0.1.0 --expected-primary-sha256 "$primary_sha" --install-root "$install_root" --bin-dir "$bin_dir"
          "$bin_dir/gcc-formed" --formed-version
          cargo xtask uninstall --install-root "$install_root" --bin-dir "$bin_dir" --mode purge-install
      - name: Dependency and license gate
        run: |
          cargo install cargo-deny --locked
          cargo deny check
