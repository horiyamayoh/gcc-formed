name: stable-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable GitHub Release semver without leading v
        required: true
        default: 1.0.0
      rc_version:
        description: Signed release-candidate payload semver promoted without rebuilding
        required: true
        default: 1.0.0-rc.1
      rollback_baseline_version:
        description: Previously published artifact semver used for rollback drill
        required: true
      allowed_diff_manifest:
        description: Optional repository-relative manifest for documentation-only qualification-to-payload differences
        required: false
        default: ""

permissions:
  contents: write

jobs:
  stable-release:
    runs-on: ubuntu-24.04
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-musl
      ARTIFACT_SLUG: linux-x86_64-musl
      MATURITY_LABEL: v1.0.0
      RELEASE_CHANNEL: stable
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-musl
      - name: Resolve runtime paths and stable release versions
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_RC_VERSION: ${{ github.event.inputs.rc_version }}
          DISPATCH_ROLLBACK_BASELINE_VERSION: ${{ github.event.inputs.rollback_baseline_version }}
        run: |
          requested_version="$DISPATCH_VERSION"
          rc_version="$DISPATCH_RC_VERSION"
          rollback_baseline_version="$DISPATCH_ROLLBACK_BASELINE_VERSION"

          if printf '%s' "$requested_version" | grep -q -- '-'; then
            echo "::error::stable workflow requires a final semver without prerelease suffix: '$requested_version'"
            exit 1
          fi
          case "$rc_version" in
            *-rc.*) ;;
            *)
              echo "::error::same-bits stable promotion requires an RC payload semver: '$rc_version'"
              exit 1
              ;;
          esac
          if [ -z "$rollback_baseline_version" ]; then
            echo "::error::rollback_baseline_version is required"
            exit 1
          fi
          if [ "$rollback_baseline_version" = "$requested_version" ]; then
            echo "::error::rollback_baseline_version must differ from the stable candidate version"
            exit 1
          fi

          work_root="$RUNNER_TEMP/stable-release-work"
          dist_dir="$work_root/dist"

          echo "REPORT_ROOT=$RUNNER_TEMP/stable-release" >> "$GITHUB_ENV"
          echo "WORK_ROOT=$work_root" >> "$GITHUB_ENV"
          echo "DIST_DIR=$dist_dir" >> "$GITHUB_ENV"
          echo "RELEASE_SEED_ROOT=$RUNNER_TEMP/stable-release-seed" >> "$GITHUB_ENV"
          echo "RELEASE_REPO_ROOT=$RUNNER_TEMP/stable-release-repo-root" >> "$GITHUB_ENV"
          echo "RELEASE_ASSET_ROOT=$RUNNER_TEMP/stable-release-assets" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=$RUNNER_TEMP/stable-release-notes.md" >> "$GITHUB_ENV"
          echo "EXPECTED_PUBLICATION_PATH=$RUNNER_TEMP/stable-release/expected-publication.json" >> "$GITHUB_ENV"
          echo "PUBLICATION_DECISION_PATH=$RUNNER_TEMP/stable-release/stable-publication-decision.json" >> "$GITHUB_ENV"
          echo "EXISTING_RELEASE_PATH=$RUNNER_TEMP/stable-release/existing-release.json" >> "$GITHUB_ENV"
          echo "EXISTING_RELEASE_ASSET_ROOT=$RUNNER_TEMP/stable-release-existing-assets" >> "$GITHUB_ENV"
          echo "PAYLOAD_SOURCE_ROOT=$RUNNER_TEMP/stable-release-payload-source" >> "$GITHUB_ENV"
          echo "WORKFLOW_DEFINITION_SHA=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$rc_version" >> "$GITHUB_ENV"
          echo "STABLE_VERSION=$requested_version" >> "$GITHUB_ENV"
          echo "ROLLBACK_BASELINE_VERSION=$rollback_baseline_version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${requested_version}" >> "$GITHUB_ENV"
          echo "RC_RELEASE_TAG=v${rc_version}" >> "$GITHUB_ENV"
          echo "CONTROL_DIR=$dist_dir/gcc-formed-v${rc_version}-${ARTIFACT_SLUG}" >> "$GITHUB_ENV"
          echo "PRIMARY_ARCHIVE=$dist_dir/gcc-formed-v${rc_version}-${ARTIFACT_SLUG}/gcc-formed-v${rc_version}-${ARTIFACT_SLUG}.tar.gz" >> "$GITHUB_ENV"
          echo "DEBUG_ARCHIVE=$dist_dir/gcc-formed-v${rc_version}-${ARTIFACT_SLUG}/gcc-formed-v${rc_version}-${ARTIFACT_SLUG}.debug.tar.gz" >> "$GITHUB_ENV"
          echo "SOURCE_ARCHIVE=$dist_dir/gcc-formed-v${rc_version}-${ARTIFACT_SLUG}/gcc-formed-v${rc_version}-source.tar.gz" >> "$GITHUB_ENV"
      - name: Prepare stable release directories
        run: |
          mkdir -p "$REPORT_ROOT/release" "$REPORT_ROOT/rc-gate" "$RELEASE_SEED_ROOT" "$RELEASE_ASSET_ROOT" "$WORK_ROOT" "$DIST_DIR"
      - name: Fetch immutable signed RC payload and release repository
        env:
          GH_TOKEN: ${{ github.token }}
          ALLOWED_DIFF_MANIFEST: ${{ github.event.inputs.allowed_diff_manifest }}
        run: |
          rc_commit="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RC_RELEASE_TAG}" --jq '.object.sha')"
          echo "RC_COMMIT=$rc_commit" >> "$GITHUB_ENV"
          echo "GATE_SOURCE_SHA=$rc_commit" >> "$GITHUB_ENV"
          git fetch --no-tags origin "$rc_commit"
          gh release download "$RC_RELEASE_TAG" \
            --dir "$RELEASE_SEED_ROOT" \
            --pattern "gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.control.tar.gz" \
            --pattern "gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo.tar.gz" \
            --pattern "release-provenance.json"
          tar -xzf "$RELEASE_SEED_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.control.tar.gz" -C "$DIST_DIR"
          tar -xzf "$RELEASE_SEED_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo.tar.gz" -C "$RELEASE_SEED_ROOT"
          mv \
            "$RELEASE_SEED_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo" \
            "$RELEASE_REPO_ROOT"
          baseline_seed="$RELEASE_SEED_ROOT/rollback-baseline"
          baseline_bundle="gcc-formed-v${ROLLBACK_BASELINE_VERSION}-${ARTIFACT_SLUG}.release-repo.tar.gz"
          baseline_repo="$baseline_seed/gcc-formed-v${ROLLBACK_BASELINE_VERSION}-${ARTIFACT_SLUG}.release-repo"
          mkdir -p "$baseline_seed"
          gh release download "v${ROLLBACK_BASELINE_VERSION}" \
            --dir "$baseline_seed" \
            --pattern "$baseline_bundle"
          tar -xzf "$baseline_seed/$baseline_bundle" -C "$baseline_seed"
          cp -R \
            "$baseline_repo/targets/$TARGET_TRIPLE/versions/v${ROLLBACK_BASELINE_VERSION}" \
            "$RELEASE_REPO_ROOT/targets/$TARGET_TRIPLE/versions/"
          python3 ci/verify_same_bits_promotion.py \
            --rc-provenance "$RELEASE_SEED_ROOT/release-provenance.json" \
            --control-dir "$CONTROL_DIR" \
            --expected-commit "$rc_commit" \
            --expected-payload-version "$PACKAGE_VERSION" \
            --output "$REPORT_ROOT/release/rc-payload-verification.json"
          python3 - "$RELEASE_SEED_ROOT/release-provenance.json" "$REPORT_ROOT/release/qualification-report.json" <<'PY'
          import json
          import sys

          source = json.load(open(sys.argv[1], "r", encoding="utf-8"))
          report = source["release"]["agent_output_quality"]
          with open(sys.argv[2], "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2)
              handle.write("\n")
          PY
          qualification_candidate_sha="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["candidate_sha"])' "$REPORT_ROOT/release/qualification-report.json")"
          git fetch --no-tags origin "$qualification_candidate_sha"
          commit_chain_args=(
            --repository-root "$GITHUB_WORKSPACE"
            --qualification-report "$REPORT_ROOT/release/qualification-report.json"
            --payload-source-sha "$rc_commit"
            --gate-source-sha "$rc_commit"
            --workflow-definition-sha "$WORKFLOW_DEFINITION_SHA"
            --output "$REPORT_ROOT/release/release-commit-chain.json"
          )
          if [ -n "$ALLOWED_DIFF_MANIFEST" ]; then
            case "$ALLOWED_DIFF_MANIFEST" in
              /*|*..*) echo "::error::allowed_diff_manifest must be a safe repository-relative path"; exit 1 ;;
            esac
            commit_chain_args+=(--allowed-diff-manifest "$GITHUB_WORKSPACE/$ALLOWED_DIFF_MANIFEST")
          fi
          python3 ci/verify_release_commit_chain.py "${commit_chain_args[@]}"
          git worktree add --detach "$PAYLOAD_SOURCE_ROOT" "$rc_commit"
          payload_source_version="$(python3 - "$PAYLOAD_SOURCE_ROOT/Cargo.toml" <<'PY'
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as handle:
              print(tomllib.load(handle)["workspace"]["package"]["version"])
          PY
          )"
          if [ "$payload_source_version" != "$PACKAGE_VERSION" ]; then
            echo "::error::RC payload version '$PACKAGE_VERSION' did not match payload-source Cargo.toml '$payload_source_version'"
            exit 1
          fi
          rm -rf "$RELEASE_REPO_ROOT/targets/$TARGET_TRIPLE/versions/v${PACKAGE_VERSION}"
      - name: cargo xtask check
        run: |
          cd "$PAYLOAD_SOURCE_ROOT"
          cargo xtask check
      - name: Strict RC gate
        run: |
          cd "$PAYLOAD_SOURCE_ROOT"
          cargo xtask rc-gate \
            --root corpus \
            --report-dir "$REPORT_ROOT/rc-gate" \
            --fuzz-root fuzz \
            --metrics-manual-report eval/rc/metrics-manual-eval.json \
            --issue-budget-report eval/rc/issue-budget.json \
            --ux-signoff-report eval/rc/ux-signoff.json
      - name: Path-aware replay stop-ship contract
        run: |
          cd "$PAYLOAD_SOURCE_ROOT"
          python3 ci/gate_replay_contract.py \
            --replay-report "$REPORT_ROOT/rc-gate/replay-report.json" \
            --output "$REPORT_ROOT/rc-gate/replay-stop-ship.json"
      - name: Output-quality candidate GCC/path matrix
        run: |
          cd "$PAYLOAD_SOURCE_ROOT"
          cargo xtask output-quality-matrix \
            --root corpus \
            --output "$REPORT_ROOT/rc-gate/human-readable-contract-matrix.json"
      - name: Stable release promotion and rollback drill
        run: |
          cargo xtask stable-release \
            --control-dir "$CONTROL_DIR" \
            --repository-root "$RELEASE_REPO_ROOT" \
            --target-triple "$TARGET_TRIPLE" \
            --install-root "$RUNNER_TEMP/stable-install/${TARGET_TRIPLE}" \
            --bin-dir "$RUNNER_TEMP/stable-bin" \
            --report-dir "$REPORT_ROOT/stable-release" \
            --rollback-baseline-version "$ROLLBACK_BASELINE_VERSION" \
            --release-identity-version "$STABLE_VERSION" \
            > "$REPORT_ROOT/release/stable-release-command.json"
      - name: Capture signing metadata
        run: |
          echo "RELEASE_SIGNING_KEY_ID=$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["key_id"])' "$CONTROL_DIR/SHA256SUMS.sig")" >> "$GITHUB_ENV"
          echo "RELEASE_SIGNING_PUBLIC_KEY_SHA256=$(python3 -c 'import hashlib, json, sys; print(hashlib.sha256(bytes.fromhex(json.load(open(sys.argv[1], "r", encoding="utf-8"))["public_key_hex"])).hexdigest())' "$CONTROL_DIR/SHA256SUMS.sig")" >> "$GITHUB_ENV"
      - name: Assemble GitHub Release bundles
        run: |
          control_bundle="$RELEASE_ASSET_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.control.tar.gz"
          release_repo_dir="$RUNNER_TEMP/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo"
          release_repo_bundle="$RELEASE_ASSET_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo.tar.gz"
          tar -czf "$control_bundle" -C "$DIST_DIR" "gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}"
          cp -R "$RELEASE_REPO_ROOT" "$release_repo_dir"
          tar -czf "$release_repo_bundle" -C "$RUNNER_TEMP" "gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo"
      - name: Write release provenance
        run: |
          python3 ci/release_provenance.py \
            --workflow stable-release \
            --report-root "$REPORT_ROOT" \
            --output "$REPORT_ROOT/release/release-provenance.json" \
            --package-version "$PACKAGE_VERSION" \
            --stable-release-version "$STABLE_VERSION" \
            --promoted-from-tag "$RC_RELEASE_TAG" \
            --target-triple "$TARGET_TRIPLE" \
            --release-channel "$RELEASE_CHANNEL" \
            --maturity-label "$MATURITY_LABEL" \
            --rollback-baseline-version "$ROLLBACK_BASELINE_VERSION" \
            --release-commit-chain-report "$REPORT_ROOT/release/release-commit-chain.json" \
            --signing-key-id "$RELEASE_SIGNING_KEY_ID" \
            --signing-public-key-sha256 "$RELEASE_SIGNING_PUBLIC_KEY_SHA256"
      - name: Write release notes
        run: |
          python3 ci/public_surface.py render-release-body \
            --kind stable \
            --version "$STABLE_VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$RC_COMMIT" \
            --signing-key-id "$RELEASE_SIGNING_KEY_ID" \
            --signing-public-key-sha256 "$RELEASE_SIGNING_PUBLIC_KEY_SHA256" \
            --rollback-baseline-version "$ROLLBACK_BASELINE_VERSION" \
            > "$RELEASE_NOTES_PATH"
      - name: Plan append-only stable publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            "$PRIMARY_ARCHIVE"
            "$DEBUG_ARCHIVE"
            "$SOURCE_ARCHIVE"
            "$CONTROL_DIR/manifest.json"
            "$CONTROL_DIR/build-info.txt"
            "$CONTROL_DIR/SHA256SUMS"
            "$CONTROL_DIR/SHA256SUMS.sig"
            "$RELEASE_ASSET_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.control.tar.gz"
            "$RELEASE_ASSET_ROOT/gcc-formed-v${PACKAGE_VERSION}-${ARTIFACT_SLUG}.release-repo.tar.gz"
            "$REPORT_ROOT/rc-gate/rc-gate-report.json"
            "$REPORT_ROOT/rc-gate/rollout-matrix-report.json"
            "$REPORT_ROOT/rc-gate/replay-stop-ship.json"
            "$REPORT_ROOT/rc-gate/human-readable-contract-matrix.json"
            "$REPORT_ROOT/rc-gate/agent-output-quality/qualification-report.json"
            "$REPORT_ROOT/rc-gate/agent-output-quality/artifact-integrity-report.json"
            "$REPORT_ROOT/rc-gate/agent-output-quality/no-subagent-attestation.json"
            "$REPORT_ROOT/rc-gate/agent-output-quality/model-agent-tool-manifest.json"
            "$REPORT_ROOT/stable-release/stable-release-report.json"
            "$REPORT_ROOT/stable-release/stable-release-summary.md"
            "$REPORT_ROOT/stable-release/promotion-evidence.json"
            "$REPORT_ROOT/stable-release/rollback-drill.json"
            "$REPORT_ROOT/release/rc-payload-verification.json"
            "$REPORT_ROOT/release/release-commit-chain.json"
            "$REPORT_ROOT/release/release-provenance.json"
          )
          build_args=()
          for asset in "${assets[@]}"; do
            build_args+=(--asset "$asset")
          done
          python3 ci/stable_publication.py build \
            --release-tag "$RELEASE_TAG" \
            --release-name "gcc-formed ${STABLE_VERSION}" \
            --tag-target-sha "$RC_COMMIT" \
            --notes-file "$RELEASE_NOTES_PATH" \
            --release-provenance "$REPORT_ROOT/release/release-provenance.json" \
            "${build_args[@]}" \
            --output "$EXPECTED_PUBLICATION_PATH"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            mkdir -p "$EXISTING_RELEASE_ASSET_ROOT"
            gh release view "$RELEASE_TAG" \
              --json assets,body,tagName,targetCommitish,name,isDraft,isPrerelease \
              > "$EXISTING_RELEASE_PATH"
            resolved_tag_target_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" --jq '.sha')"
            python3 - "$EXISTING_RELEASE_PATH" "$resolved_tag_target_sha" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          payload = json.load(open(path, "r", encoding="utf-8"))
          payload["resolvedTagTargetSha"] = sys.argv[2]
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY
            while IFS=$'\t' read -r asset_api_url asset_name; do
              [ -n "$asset_api_url" ] || continue
              if [ "$(basename "$asset_name")" != "$asset_name" ]; then
                echo "::error::unsafe GitHub Release asset name '$asset_name'"
                exit 1
              fi
              asset_id="${asset_api_url##*/}"
              gh api "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
                -H "Accept: application/octet-stream" \
                > "$EXISTING_RELEASE_ASSET_ROOT/$asset_name"
            done < <(python3 - "$EXISTING_RELEASE_PATH" <<'PY'
          import json
          import sys

          for asset in json.load(open(sys.argv[1], "r", encoding="utf-8"))["assets"]:
              if not str(asset.get("digest", "")).startswith("sha256:"):
                  print(f'{asset["apiUrl"]}\t{asset["name"]}')
          PY
            )
            if python3 - "$EXISTING_RELEASE_PATH" <<'PY'
          import json
          import sys

          assets = json.load(open(sys.argv[1], "r", encoding="utf-8"))["assets"]
          raise SystemExit(0 if any(asset["name"] == "release-provenance.json" for asset in assets) else 1)
          PY
            then
              if [ ! -f "$EXISTING_RELEASE_ASSET_ROOT/release-provenance.json" ]; then
                gh release download "$RELEASE_TAG" \
                  --dir "$EXISTING_RELEASE_ASSET_ROOT" \
                  --pattern "release-provenance.json"
              fi
              existing_provenance_args=(
                --existing-provenance "$EXISTING_RELEASE_ASSET_ROOT/release-provenance.json"
              )
            else
              existing_provenance_args=()
            fi
            python3 ci/stable_publication.py decide \
              --expected-manifest "$EXPECTED_PUBLICATION_PATH" \
              --existing-inventory "$EXISTING_RELEASE_PATH" \
              --existing-assets-dir "$EXISTING_RELEASE_ASSET_ROOT" \
              "${existing_provenance_args[@]}" \
              --output "$PUBLICATION_DECISION_PATH"
          else
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
              existing_tag_target_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" --jq '.sha')"
              existing_tag_args=(--existing-tag-target-sha "$existing_tag_target_sha")
            else
              existing_tag_args=()
            fi
            python3 ci/stable_publication.py decide \
              --expected-manifest "$EXPECTED_PUBLICATION_PATH" \
              "${existing_tag_args[@]}" \
              --output "$PUBLICATION_DECISION_PATH"
          fi
      - name: Publish GitHub release append-only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          decision="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], "r", encoding="utf-8"))["decision"])' "$PUBLICATION_DECISION_PATH")"
          case "$decision" in
            create)
              mapfile -t upload_paths < <(python3 - "$EXPECTED_PUBLICATION_PATH" <<'PY'
          import json
          import sys

          for asset in json.load(open(sys.argv[1], "r", encoding="utf-8"))["assets"]:
              print(asset["source_path"])
          PY
              )
              gh release create "$RELEASE_TAG" "${upload_paths[@]}" \
                --target "$RC_COMMIT" \
                --title "gcc-formed ${STABLE_VERSION}" \
                --notes-file "$RELEASE_NOTES_PATH" \
                --latest
              ;;
            upload_missing)
              mapfile -t upload_paths < <(python3 - "$PUBLICATION_DECISION_PATH" <<'PY'
          import json
          import sys

          for path in json.load(open(sys.argv[1], "r", encoding="utf-8"))["missing_asset_paths"]:
              print(path)
          PY
              )
              gh release upload "$RELEASE_TAG" "${upload_paths[@]}"
              ;;
            noop)
              echo "stable release already matches exactly; no GitHub Release write required"
              ;;
            *)
              echo "::error::unexpected stable publication decision '$decision'"
              exit 1
              ;;
          esac
      - name: Upload stable release evidence
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: stable-release-evidence
          path: ${{ env.REPORT_ROOT }}
