schema_version: 1
fixture_id: c/partial/case-01
support_tier: A
expected_mode: render
semantic:
  family: linker.undefined_reference
  severity: error
  lead_group_any_of:
    - residual-0
    - residual-1
  first_action_required: true
  raw_provenance_required: true
  fallback: allowed
  confidence_min: medium
render:
  default:
    omission_notice_required: false
    first_screenful_max_lines: 24
    first_action_max_line: 3
    partial_notice_required: true
    raw_diagnostics_hint_required: true
    raw_sub_block_required: true
    required_substrings:
      - "linker: symbol `missing_symbol`"
      - "  main.c:(.text+0x5): undefined reference to `missing_symbol'"
      - "raw: rerun with --formed-profile=raw_fallback"
  concise:
    omission_notice_required: false
    first_screenful_max_lines: 14
    partial_notice_required: true
    raw_diagnostics_hint_required: true
    raw_sub_block_required: true
  verbose:
    omission_notice_required: false
    first_screenful_max_lines: 40
    partial_notice_required: true
    raw_diagnostics_hint_required: true
    raw_sub_block_required: true
  ci:
    first_screenful_max_lines: 16
    first_action_max_line: 3
    partial_notice_required: true
    raw_diagnostics_hint_required: true
    raw_sub_block_required: true
    color_meaning_forbidden: true
    required_substrings:
      - "linker: error: undefined reference to `missing_symbol`"
      - "  main.c:(.text+0x5): undefined reference to `missing_symbol'"
      - "raw: rerun with --formed-profile=raw_fallback"
  raw_fallback:
    first_screenful_max_lines: 20
    color_meaning_forbidden: true
    required_substrings:
      - "note: fallback reason = user_opt_out"
      - "raw:"
integrity:
  allowed_issue_codes: []
performance:
  parse_time_ms_max: 50
  render_time_ms_max: 40
